version: 1
model_name: meta-llama/Llama-2-7b-hf
output_root: result/lora_mezo_exploration

# Development-only selection prevents tuning on the formal evaluation split.
common:
  task_name: SST2
  num_train: 1000
  num_dev: 500
  num_eval: 1000
  max_length: 2048
  gradient_accumulation_steps: 1
  load_bfloat16: true
  train_as_classification: true
  weight_decay: 0.0
  logging_steps: 10
  eval_steps: 500
  dev_only: true

stages:
  optimizer:
    description: Calibrate the MeZO learning rate and finite-difference scale.
    fixed:
      seed: 0
      lora_r: 8
      lora_alpha: 16
      lora_target_modules: q_proj,v_proj
      lora_num_layers: -1
      batch_size: 4
      max_steps: 3000
      lr_scheduler_type: constant
      warmup_ratio: 0.0
    grid:
      learning_rate: [3.0e-6, 1.0e-5, 3.0e-5, 1.0e-4]
      zo_eps: [3.0e-4, 1.0e-3, 3.0e-3]

  structure:
    description: Search LoRA rank, projections, and trained layer depth.
    inherits: optimizer_best
    fixed:
      seed: 0
      batch_size: 4
      max_steps: 6000
      lr_scheduler_type: constant
      warmup_ratio: 0.0
    variants:
      - {lora_r: 4, lora_alpha: 8, lora_target_modules: "q_proj,v_proj", lora_num_layers: 16}
      - {lora_r: 4, lora_alpha: 8, lora_target_modules: "q_proj,v_proj", lora_num_layers: -1}
      - {lora_r: 8, lora_alpha: 16, lora_target_modules: q_proj, lora_num_layers: -1}
      - {lora_r: 8, lora_alpha: 16, lora_target_modules: "q_proj,v_proj", lora_num_layers: 8}
      - {lora_r: 8, lora_alpha: 16, lora_target_modules: "q_proj,v_proj", lora_num_layers: 16}
      - {lora_r: 8, lora_alpha: 16, lora_target_modules: "q_proj,v_proj", lora_num_layers: -1}
      - {lora_r: 16, lora_alpha: 32, lora_target_modules: "q_proj,v_proj", lora_num_layers: 16}
      - {lora_r: 16, lora_alpha: 32, lora_target_modules: "q_proj,v_proj", lora_num_layers: -1}

  budget:
    description: Tune batch size, training horizon, and schedule around the selected adapter.
    inherits: structure_best
    fixed:
      seed: 0
      warmup_ratio: 0.0
    variants:
      - {batch_size: 2, max_steps: 10000, lr_scheduler_type: constant}
      - {batch_size: 4, max_steps: 6000, lr_scheduler_type: constant}
      - {batch_size: 4, max_steps: 10000, lr_scheduler_type: constant}
      - {batch_size: 8, max_steps: 5000, lr_scheduler_type: constant}
      - {batch_size: 8, max_steps: 10000, lr_scheduler_type: constant}
      - {batch_size: 4, max_steps: 10000, lr_scheduler_type: cosine}

  confirm:
    description: Confirm the two best complete configurations over three seeds.
    inherits: finalists
    seeds: [0, 1, 2]
